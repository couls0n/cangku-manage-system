server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: warehouse-management
  profiles:
    default: dev
  h2:
    console:
      enabled: false
      path: /h2-console
  datasource:
    initialization-mode: never
  redis:
    host: ${WAREHOUSE_REDIS_HOST:127.0.0.1}
    port: ${WAREHOUSE_REDIS_PORT:6379}
    database: ${WAREHOUSE_REDIS_DATABASE:0}
    timeout: ${WAREHOUSE_REDIS_TIMEOUT:3000ms}
    password: ${WAREHOUSE_REDIS_PASSWORD:}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: true
    locations: classpath:db/migration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.warehouse.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  pattern:
    level: "%5p [%X{requestId:-}]"
  level:
    root: INFO
    com.warehouse: INFO

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

warehouse:
  security:
    token-secret: ${WAREHOUSE_TOKEN_SECRET}
    token-expire-hours: ${WAREHOUSE_TOKEN_EXPIRE_HOURS:12}
    ebpf-ingest-key: ${WAREHOUSE_EBPF_INGEST_KEY}
    rate-limit:
      default-limit: ${WAREHOUSE_RATE_LIMIT_DEFAULT:120}
      default-window-seconds: ${WAREHOUSE_RATE_LIMIT_DEFAULT_WINDOW:60}
      login-limit: ${WAREHOUSE_RATE_LIMIT_LOGIN:10}
      login-window-seconds: ${WAREHOUSE_RATE_LIMIT_LOGIN_WINDOW:60}
  stock:
    lock:
      enabled: ${WAREHOUSE_STOCK_LOCK_ENABLED:false}
      wait-seconds: ${WAREHOUSE_STOCK_LOCK_WAIT_SECONDS:3}
      lease-seconds: ${WAREHOUSE_STOCK_LOCK_LEASE_SECONDS:10}
  web:
    cors:
      allowed-origins: ${WAREHOUSE_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: Authorization,Content-Type,X-Request-Id
      max-age: 3600
